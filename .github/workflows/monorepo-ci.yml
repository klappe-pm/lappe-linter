name: monorepo-ci

on:
  push:
    branches: [master, feat/**]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @lappe-linter/core
      - run: npm run build --workspace @lappe-linter/cli
      - run: npm run build
      - run: npm test
